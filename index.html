<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>目標追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAF8; --surface: #FFFFFF; --border: #EBEBEB; --border-strong: #D8D8D8;
    --text-primary: #1A1A1A; --text-secondary: #7A7A7A; --text-hint: #AEAEAE;
    --learn: #3B6E8F; --learn-bg: #EEF4F8;
    --work: #5A6E3B; --work-bg: #F1F5EE;
    --life: #8F5A3B; --life-bg: #F8F2EE;
    --book: #6B3B8F; --book-bg: #F4EEF8;
    --course: #3B6E6E; --course-bg: #EEF8F8;
    --radius: 14px; --radius-sm: 8px;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Noto Sans TC', sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  body { display: flex; justify-content: center; padding: 0 0 88px; }
  .app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); }

  .header { padding: 52px 24px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; line-height: 1.1; }
  .header-date { font-size: 12px; color: var(--text-hint); letter-spacing: 0.5px; padding-bottom: 4px; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .summary-item { text-align: center; }
  .summary-num { font-size: 22px; font-weight: 700; line-height: 1; }
  .summary-label { font-size: 11px; color: var(--text-hint); margin-top: 4px; }

  .tabs { display: flex; gap: 8px; padding: 14px 24px; overflow-x: auto; scrollbar-width: none; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 136px; z-index: 9; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border-strong); background: transparent; color: var(--text-secondary); transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; }
  .tab.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
  .tab[data-cat="讀書"].active { background: var(--book); border-color: var(--book); }
  .tab[data-cat="上課"].active { background: var(--course); border-color: var(--course); }
  .tab[data-cat="學習"].active { background: var(--learn); border-color: var(--learn); }
  .tab[data-cat="工作"].active { background: var(--work); border-color: var(--work); }
  .tab[data-cat="生活"].active { background: var(--life); border-color: var(--life); }

  .goal-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .goal-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px 18px 14px; animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .goal-card.done { opacity: 0.5; }
  .goal-card.done .goal-title { text-decoration: line-through; color: var(--text-secondary); }

  .goal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .goal-left { flex: 1; min-width: 0; }
  .goal-cat-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
  .badge-讀書 { background: var(--book-bg); color: var(--book); }
  .badge-上課 { background: var(--course-bg); color: var(--course); }
  .badge-學習 { background: var(--learn-bg); color: var(--learn); }
  .badge-工作 { background: var(--work-bg); color: var(--work); }
  .badge-生活 { background: var(--life-bg); color: var(--life); }
  .goal-title { font-size: 15px; font-weight: 500; line-height: 1.4; }
  .goal-sub { font-size: 12px; color: var(--text-hint); margin-top: 3px; }

  .goal-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn { width: 30px; height: 30px; border-radius: var(--radius-sm); border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-hint); transition: background 0.15s, color 0.15s; }
  .icon-btn:hover { background: var(--border); color: var(--text-secondary); }
  .icon-btn.done-active { color: #4caf50; }

  .progress-wrap { margin-bottom: 4px; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-text { font-size: 11px; color: var(--text-hint); }
  .progress-pct { font-size: 13px; font-weight: 700; }
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .fill-讀書 { background: var(--book); }
  .fill-上課 { background: var(--course); }
  .fill-學習 { background: var(--learn); }
  .fill-工作 { background: var(--work); }
  .fill-生活 { background: var(--life); }

  .inline-edit { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .inline-edit.open { display: block; }
  .ie-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ie-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; min-width: 56px; }
  .ie-input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--text-primary); background: var(--bg); outline: none; transition: border-color 0.2s; }
  .ie-input:focus { border-color: var(--text-primary); }
  .ie-unit { font-size: 12px; color: var(--text-hint); white-space: nowrap; }
  .ie-slider-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  .ie-slider { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
  .ie-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text-primary); cursor: pointer; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .ie-pct { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
  .ie-save { width: 100%; padding: 9px; background: var(--text-primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; font-weight: 500; margin-top: 2px; }

  .goal-note { font-size: 12px; color: var(--text-hint); margin-top: 8px; line-height: 1.5; }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-hint); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  .fab { position: fixed; bottom: 28px; right: 50%; transform: translateX(50%); max-width: 430px; width: calc(100% - 48px); height: 52px; background: var(--text-primary); color: white; border: none; border-radius: 26px; font-size: 15px; font-weight: 500; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.18); transition: transform 0.15s; }
  .fab:active { transform: translateX(50%) scale(0.97); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 28px 24px 44px; width: 100%; max-width: 430px; animation: slideUp 0.3s cubic-bezier(.4,0,.2,1); max-height: 92vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: 'Noto Sans TC', sans-serif; color: var(--text-primary); background: var(--bg); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-input:focus, .form-select:focus { border-color: var(--text-primary); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hint { font-size: 12px; color: var(--text-hint); margin-top: 5px; }
  .pct-row { display: flex; align-items: center; gap: 12px; }
  .pct-row input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
  .pct-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--text-primary); cursor: pointer; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .pct-display { font-size: 15px; font-weight: 700; min-width: 40px; text-align: right; }
  .modal-btn { width: 100%; height: 52px; background: var(--text-primary); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; margin-top: 8px; }
  .cond { display: none; }
  .cond.on { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">我的目標</div>
      <div class="header-date" id="today-date"></div>
    </div>
    <div class="summary">
      <div class="summary-item"><div class="summary-num" id="sum-total">0</div><div class="summary-label">全部目標</div></div>
      <div class="summary-item"><div class="summary-num" id="sum-done">0</div><div class="summary-label">已完成</div></div>
      <div class="summary-item"><div class="summary-num" id="sum-avg">0%</div><div class="summary-label">平均進度</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-cat="全部" onclick="setFilter('全部',this)">全部</button>
    <button class="tab" data-cat="讀書" onclick="setFilter('讀書',this)">讀書</button>
    <button class="tab" data-cat="上課" onclick="setFilter('上課',this)">上課</button>
    <button class="tab" data-cat="學習" onclick="setFilter('學習',this)">學習</button>
    <button class="tab" data-cat="工作" onclick="setFilter('工作',this)">工作</button>
    <button class="tab" data-cat="生活" onclick="setFilter('生活',this)">生活</button>
  </div>

  <div class="goal-list" id="goal-list"></div>
  <button class="fab" onclick="openAdd()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    新增目標
  </button>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-ttl">新增目標</div>
    <input type="hidden" id="eidx" value="-1">
    <div class="form-group">
      <label class="form-label">分類</label>
      <select class="form-select" id="f-cat" onchange="onCat()">
        <option value="讀書">讀書</option>
        <option value="上課">上課</option>
        <option value="學習">學習</option>
        <option value="工作">工作</option>
        <option value="生活">生活</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="f-title-label">書名</label>
      <input class="form-input" id="f-title" type="text" placeholder="例如：原子習慣">
    </div>
    <div class="form-group cond on" id="c-book">
      <label class="form-label">讀書進度</label>
      <div class="two-col">
        <div><label class="form-label">總頁數</label><input class="form-input" id="f-total" type="number" placeholder="320" min="1"></div>
        <div><label class="form-label">目前頁數</label><input class="form-input" id="f-cur" type="number" placeholder="0" min="0"></div>
      </div>
      <div class="hint">進度自動計算百分比</div>
    </div>
    <div class="form-group cond" id="c-course">
      <label class="form-label">上課進度</label>
      <div class="two-col">
        <div><label class="form-label">總章節數</label><input class="form-input" id="f-chapters" type="number" placeholder="12" min="1"></div>
        <div><label class="form-label">目前章節</label><input class="form-input" id="f-curch" type="number" placeholder="0" min="0"></div>
      </div>
      <div class="hint">進度自動計算百分比</div>
    </div>
    <div class="form-group cond" id="c-manual">
      <label class="form-label">目前進度</label>
      <div class="pct-row">
        <input type="range" min="0" max="100" value="0" id="f-pct" oninput="document.getElementById('f-pctd').textContent=this.value+'%'">
        <span class="pct-display" id="f-pctd">0%</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備註（選填）</label>
      <input class="form-input" id="f-note" type="text" placeholder="截止日、備忘等">
    </div>
    <button class="modal-btn" onclick="saveGoal()">儲存</button>
  </div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem('gt_v4') || '[]');
let filter = '全部';

const save = () => localStorage.setItem('gt_v4', JSON.stringify(goals));

function pct(g) {
  if (g.cat === '讀書' && g.total > 0) return Math.min(100, Math.round(g.cur / g.total * 100));
  if (g.cat === '上課' && g.chapters > 0) return Math.min(100, Math.round(g.curch / g.chapters * 100));
  return g.pct || 0;
}

function setFilter(cat, el) {
  filter = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('goal-list');
  const shown = filter === '全部' ? goals : goals.filter(g => g.cat === filter);
  const pcts = goals.map(pct);
  document.getElementById('sum-total').textContent = goals.length;
  document.getElementById('sum-done').textContent = pcts.filter(p => p >= 100).length;
  document.getElementById('sum-avg').textContent = (goals.length ? Math.round(pcts.reduce((a,p)=>a+p,0)/goals.length) : 0) + '%';

  if (!shown.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">還沒有目標<br>點下方按鈕新增第一個</div></div>';
    return;
  }

  list.innerHTML = shown.map(g => {
    const i = goals.indexOf(g);
    const p = pct(g);
    const done = p >= 100;
    let sub = '';
    if (g.cat === '讀書' && g.total) sub = `第 ${g.cur||0} 頁 / 共 ${g.total} 頁`;
    else if (g.cat === '上課' && g.chapters) sub = `第 ${g.curch||0} 章 / 共 ${g.chapters} 章`;

    let ieFields = '';
    if (g.cat === '讀書') {
      ieFields = `
        <div class="ie-row"><span class="ie-label">目前頁數</span><input class="ie-input" type="number" id="ie-cur-${i}" value="${g.cur||0}" min="0"><span class="ie-unit">/ ${g.total||'?'} 頁</span></div>
        <div class="ie-row"><span class="ie-label">總頁數</span><input class="ie-input" type="number" id="ie-tot-${i}" value="${g.total||0}" min="1"></div>`;
    } else if (g.cat === '上課') {
      ieFields = `
        <div class="ie-row"><span class="ie-label">目前章節</span><input class="ie-input" type="number" id="ie-cur-${i}" value="${g.curch||0}" min="0"><span class="ie-unit">/ ${g.chapters||'?'} 章</span></div>
        <div class="ie-row"><span class="ie-label">總章節</span><input class="ie-input" type="number" id="ie-tot-${i}" value="${g.chapters||0}" min="1"></div>`;
    } else {
      ieFields = `
        <div class="ie-row"><span class="ie-label">進度</span>
          <div class="ie-slider-wrap"><input type="range" class="ie-slider" id="ie-cur-${i}" min="0" max="100" value="${p}" oninput="document.getElementById('ie-pct-${i}').textContent=this.value+'%'"><span class="ie-pct" id="ie-pct-${i}">${p}%</span></div>
        </div>`;
    }

    return `<div class="goal-card${done?' done':''}" id="card-${i}">
      <div class="goal-header">
        <div class="goal-left">
          <span class="goal-cat-badge badge-${g.cat}">${g.cat}</span>
          <div class="goal-title">${g.title}</div>
          ${sub ? `<div class="goal-sub">${sub}</div>` : ''}
        </div>
        <div class="goal-actions">
          <button class="icon-btn${done?' done-active':''}" onclick="toggleDone(${i})" title="完成">✓</button>
          <button class="icon-btn" onclick="toggleIE(${i})" title="編輯進度">✎</button>
          <button class="icon-btn" onclick="openEdit(${i})" title="編輯目標">⋯</button>
          <button class="icon-btn" onclick="delGoal(${i})" title="刪除">✕</button>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span class="progress-text">進度</span>
          <span class="progress-pct" id="pp-${i}">${p}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill fill-${g.cat}" id="pf-${i}" style="width:${p}%"></div></div>
      </div>
      <div class="inline-edit" id="ie-${i}">
        ${ieFields}
        <button class="ie-save" onclick="saveIE(${i})">儲存進度</button>
      </div>
      ${g.note ? `<div class="goal-note">${g.note}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleIE(i) { document.getElementById('ie-'+i).classList.toggle('open'); }

function saveIE(i) {
  const g = goals[i];
  const curEl = document.getElementById('ie-cur-'+i);
  const totEl = document.getElementById('ie-tot-'+i);
  if (g.cat === '讀書') { g.cur = parseInt(curEl.value)||0; if(totEl) g.total = parseInt(totEl.value)||g.total; }
  else if (g.cat === '上課') { g.curch = parseInt(curEl.value)||0; if(totEl) g.chapters = parseInt(totEl.value)||g.chapters; }
  else { g.pct = parseInt(curEl.value)||0; }
  save(); render();
}

function toggleDone(i) {
  const g = goals[i];
  const p = pct(g);
  if (p >= 100) {
    if (g.cat==='讀書') g.cur=0; else if (g.cat==='上課') g.curch=0; else g.pct=0;
  } else {
    if (g.cat==='讀書') g.cur=g.total||0; else if (g.cat==='上課') g.curch=g.chapters||0; else g.pct=100;
  }
  save(); render();
}

function delGoal(i) { if(confirm('確定刪除這個目標？')) { goals.splice(i,1); save(); render(); } }

function onCat() {
  const cat = document.getElementById('f-cat').value;
  const lbl = document.getElementById('f-title-label');
  const inp = document.getElementById('f-title');
  document.getElementById('c-book').classList.remove('on');
  document.getElementById('c-course').classList.remove('on');
  document.getElementById('c-manual').classList.remove('on');
  if (cat==='讀書') { lbl.textContent='書名'; inp.placeholder='例如：原子習慣'; document.getElementById('c-book').classList.add('on'); }
  else if (cat==='上課') { lbl.textContent='課程名稱'; inp.placeholder='例如：Claude 入門課程'; document.getElementById('c-course').classList.add('on'); }
  else { lbl.textContent='目標名稱'; inp.placeholder='例如：每週運動三次'; document.getElementById('c-manual').classList.add('on'); }
}

function resetForm() {
  document.getElementById('eidx').value='-1';
  document.getElementById('f-cat').value='讀書'; onCat();
  ['f-title','f-note','f-total','f-cur','f-chapters','f-curch'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-pct').value=0; document.getElementById('f-pctd').textContent='0%';
}

function openAdd() { document.getElementById('modal-ttl').textContent='新增目標'; resetForm(); document.getElementById('modal').classList.add('open'); setTimeout(()=>document.getElementById('f-title').focus(),300); }

function openEdit(i) {
  const g=goals[i];
  document.getElementById('modal-ttl').textContent='編輯目標';
  document.getElementById('eidx').value=i;
  document.getElementById('f-cat').value=g.cat; onCat();
  document.getElementById('f-title').value=g.title;
  document.getElementById('f-note').value=g.note||'';
  if (g.cat==='讀書') { document.getElementById('f-total').value=g.total||''; document.getElementById('f-cur').value=g.cur||0; }
  else if (g.cat==='上課') { document.getElementById('f-chapters').value=g.chapters||''; document.getElementById('f-curch').value=g.curch||0; }
  else { const p=g.pct||0; document.getElementById('f-pct').value=p; document.getElementById('f-pctd').textContent=p+'%'; }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveGoal() {
  const title=document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const cat=document.getElementById('f-cat').value;
  const note=document.getElementById('f-note').value.trim();
  const ei=parseInt(document.getElementById('eidx').value);
  let obj={title,cat,note};
  if (cat==='讀書') { obj.total=parseInt(document.getElementById('f-total').value)||0; obj.cur=parseInt(document.getElementById('f-cur').value)||0; }
  else if (cat==='上課') { obj.chapters=parseInt(document.getElementById('f-chapters').value)||0; obj.curch=parseInt(document.getElementById('f-curch').value)||0; }
  else { obj.pct=parseInt(document.getElementById('f-pct').value)||0; }
  if (ei>=0) goals[ei]=obj; else goals.unshift(obj);
  save(); closeModal(); render();
}

const now=new Date();
const days=['日','一','二','三','四','五','六'];
document.getElementById('today-date').textContent=`${now.getMonth()+1}/${now.getDate()} 週${days[now.getDay()]}`;

if (!goals.length) {
  goals=[
    {title:'原子習慣',cat:'讀書',total:320,cur:210,note:'每天睡前 30 分鐘'},
    {title:'Claude AI 入門課',cat:'上課',chapters:12,curch:5,note:''},
    {title:'完成 Q2 專案提案',cat:'工作',pct:40,note:'截止 6/30'},
    {title:'每週運動三次',cat:'生活',pct:80,note:''},
  ];
  save();
}
render();
</script>
